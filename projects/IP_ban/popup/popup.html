<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>DC IP Ban</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>⛔ DC IP Ban</h1>
      <p class="subtitle">도배기 탭 유동 게시물 자동 차단 / 수동 해제</p>
    </header>

    <div class="toggle-section">
      <label class="toggle-switch">
        <input type="checkbox" id="toggleBtn">
        <span class="slider"></span>
      </label>
      <span id="toggleLabel" class="toggle-label">OFF</span>
    </div>

    <div class="status-section">
      <h2>📊 현재 상태</h2>
      <div class="status-grid">
        <div class="status-item">
          <span class="status-label">상태</span>
          <span id="statusText" class="status-value status-off">🔴 정지</span>
        </div>
        <div class="status-item">
          <span class="status-label">현재 페이지</span>
          <span id="currentPosition" class="status-value">-</span>
        </div>
        <div class="status-item">
          <span class="status-label">총 차단</span>
          <span id="totalBanned" class="status-value">0건</span>
        </div>
        <div class="status-item">
          <span class="status-label">활성 차단</span>
          <span id="activeBanCount" class="status-value">0건</span>
        </div>
        <div class="status-item">
          <span class="status-label">총 해제</span>
          <span id="totalReleased" class="status-value">0건</span>
        </div>
        <div class="status-item">
          <span class="status-label">완료 사이클</span>
          <span id="cycleCount" class="status-value">0회</span>
        </div>
      </div>
    </div>

    <details class="settings-section">
      <summary>⚙️ 설정</summary>
      <div class="settings-grid">
        <div class="setting-item">
          <label for="minPage">시작 페이지</label>
          <input type="number" id="minPage" min="1" max="50" value="1">
        </div>
        <div class="setting-item">
          <label for="maxPage">끝 페이지</label>
          <input type="number" id="maxPage" min="1" max="50" value="5">
        </div>
        <div class="setting-item">
          <label for="requestDelay">요청 딜레이 (ms)</label>
          <input type="number" id="requestDelay" min="0" max="10000" step="50" value="500">
        </div>
        <div class="setting-item">
          <label for="cycleDelay">사이클 딜레이 (ms)</label>
          <input type="number" id="cycleDelay" min="0" max="60000" step="500" value="5000">
        </div>
        <div class="setting-item">
          <label for="releaseScanMaxPages">해제 검색 페이지 수</label>
          <input type="number" id="releaseScanMaxPages" min="1" max="100" value="20">
        </div>
        <button id="saveConfigBtn" class="btn btn-config">설정 저장</button>
      </div>
    </details>

    <div class="action-section">
      <button id="releaseBtn" class="btn btn-release">내가 차단한 대상 해제</button>
    </div>

    <div class="log-section">
      <h2>📜 최근 로그</h2>
      <div id="logList" class="log-list">
        <div class="log-empty">로그가 없습니다.</div>
      </div>
    </div>

    <div class="footer">
      <button id="resetBtn" class="btn btn-reset">통계 초기화</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
